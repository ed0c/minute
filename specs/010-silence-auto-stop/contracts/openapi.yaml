openapi: 3.0.3
info:
  title: Minute Silence Auto-Stop Contract (Abstract)
  version: 0.1.0
  description: |
    This OpenAPI document is an abstract UI ↔ core boundary contract.
    Minute is not an HTTP service; endpoints model commands/events between
    app layers for silence auto-stop and shared-window-closed handling.

servers:
  - url: http://localhost

paths:
  /recording/start:
    post:
      summary: Start recording with silence detection enabled
      responses:
        '200':
          description: Recording session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingSessionState'

  /recording/stop:
    post:
      summary: Stop recording manually
      responses:
        '200':
          description: Recording stopped manually
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingSessionState'

  /recording/silence/status:
    get:
      summary: Get current silence monitor and warning countdown status
      responses:
        '200':
          description: Current silence detection status for active session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SilenceStatus'

  /recording/silence/warning/keep-recording:
    post:
      summary: User keeps recording from the silence warning
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeepRecordingRequest'
      responses:
        '200':
          description: Pending auto-stop canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningResolutionResult'
        '409':
          description: No active silence warning for provided session/alert

  /recording/alerts/{alertId}/acknowledge:
    post:
      summary: Acknowledge a non-blocking alert (for example, shared-window-closed)
      parameters:
        - in: path
          name: alertId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Alert acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
        '404':
          description: Alert not found

  /recording/events:
    get:
      summary: Retrieve session event history used to explain stop/continue outcomes
      parameters:
        - in: query
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session event list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecordingSessionEvent'

components:
  schemas:
    RecordingPhase:
      type: string
      enum:
        - idle
        - recording
        - warning_active
        - auto_stop_executed
        - stopped
        - canceled

    RecordingSessionState:
      type: object
      required:
        - sessionId
        - phase
        - startedAt
      properties:
        sessionId:
          type: string
          format: uuid
        phase:
          $ref: '#/components/schemas/RecordingPhase'
        startedAt:
          type: string
          format: date-time
        stoppedAt:
          type: string
          format: date-time
          nullable: true
        stopReason:
          type: string
          nullable: true
          enum:
            - silence_auto_stop
            - manual_stop
            - recording_canceled

    SilenceStatus:
      type: object
      required:
        - sessionId
        - silenceAccumulatedSeconds
        - warningActive
        - pendingAutoStop
      properties:
        sessionId:
          type: string
          format: uuid
        silenceAccumulatedSeconds:
          type: number
          minimum: 0
        warningActive:
          type: boolean
        pendingAutoStop:
          type: boolean
        warningAlert:
          $ref: '#/components/schemas/Alert'

    AlertType:
      type: string
      enum:
        - silence_stop_warning
        - screen_window_closed

    Alert:
      type: object
      required:
        - alertId
        - alertType
        - sessionId
        - message
        - issuedAt
        - status
      properties:
        alertId:
          type: string
          format: uuid
        alertType:
          $ref: '#/components/schemas/AlertType'
        sessionId:
          type: string
          format: uuid
        message:
          type: string
        issuedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
        actions:
          type: array
          items:
            type: string
            enum:
              - keep_recording
              - acknowledge
        status:
          type: string
          enum:
            - active
            - resolved
            - expired

    KeepRecordingRequest:
      type: object
      required:
        - sessionId
        - alertId
      properties:
        sessionId:
          type: string
          format: uuid
        alertId:
          type: string
          format: uuid

    WarningResolutionResult:
      type: object
      required:
        - sessionId
        - alertId
        - resolution
      properties:
        sessionId:
          type: string
          format: uuid
        alertId:
          type: string
          format: uuid
        resolution:
          type: string
          enum:
            - kept_recording
            - canceled_by_speech
            - already_resolved

    RecordingSessionEvent:
      type: object
      required:
        - eventId
        - sessionId
        - eventType
        - timestamp
      properties:
        eventId:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        eventType:
          type: string
          enum:
            - silence_warning_issued
            - keep_recording_selected
            - warning_canceled_by_speech
            - auto_stop_executed
            - manual_stop
            - recording_canceled
            - screen_window_closed_notified
        timestamp:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
