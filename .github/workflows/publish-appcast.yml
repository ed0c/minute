name: Publish Sparkle Appcast

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Release tag to publish appcast from (e.g. v0.9.1)"
        required: false

permissions:
  contents: read

jobs:
  publish-appcast:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure publish token is configured
        run: |
          if [ -z "${{ secrets.APPCAST_PUBLISH_TOKEN }}" ]; then
            echo "error: APPCAST_PUBLISH_TOKEN secret is not set" >&2
            exit 1
          fi

      - name: Resolve release metadata
        id: release
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.ref }}" ]; then
            tag="${{ inputs.ref }}"
            echo "Fetching release metadata for tag $tag"
            curl -sSL -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag" \
              -o release.json
          else
            echo "Using release metadata from event payload"
            cp "$GITHUB_EVENT_PATH" release.json
          fi
          echo "release_path=$(pwd)/release.json" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Locate appcast asset
        id: appcast
        run: |
          set -euo pipefail
          asset_id=$(python - <<'PY'
import json, os, sys
path=os.environ["RELEASE_JSON"]
data=json.load(open(path))
release=data.get("release", data)
assets=release.get("assets", [])
for asset in assets:
    if asset.get("name") == "appcast.xml":
        print(asset.get("id", ""))
        sys.exit(0)
sys.exit(1)
PY
)
          if [ -z "$asset_id" ]; then
            echo "error: appcast.xml not found in release assets" >&2
            exit 1
          fi
          echo "asset_id=$asset_id" >> "$GITHUB_OUTPUT"
        env:
          RELEASE_JSON: ${{ steps.release.outputs.release_path }}

      - name: Download appcast asset
        run: |
          set -euo pipefail
          curl -sSL -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${{ github.repository }}/releases/assets/${{ steps.appcast.outputs.asset_id }}" \
            -o appcast.xml
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Checkout GitHub Pages repo
        uses: actions/checkout@v4
        with:
          repository: roblibob/roblibob.github.io
          token: ${{ secrets.APPCAST_PUBLISH_TOKEN }}
          path: gh-pages

      - name: Publish appcast.xml
        run: |
          cp "appcast.xml" "gh-pages/appcast.xml"
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No appcast changes to publish."
            exit 0
          fi
          git add appcast.xml
          git commit -m "Update appcast"
          git push
