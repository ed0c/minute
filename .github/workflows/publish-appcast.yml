name: Publish Sparkle Appcast

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish appcast from (tag, branch, or SHA)"
        required: false

permissions:
  contents: read

jobs:
  publish-appcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref || 'main' }}

      - name: Ensure publish token is configured
        run: |
          if [ -z "${{ secrets.APPCAST_PUBLISH_TOKEN }}" ]; then
            echo "error: APPCAST_PUBLISH_TOKEN secret is not set" >&2
            exit 1
          fi

      - name: Verify appcast exists
        run: |
          if [ ! -f "appcast.xml" ]; then
            echo "error: appcast.xml not found in repo" >&2
            exit 1
          fi

      - name: Checkout GitHub Pages repo
        uses: actions/checkout@v4
        with:
          repository: roblibob/roblibob.github.io
          token: ${{ secrets.APPCAST_PUBLISH_TOKEN }}
          path: gh-pages

      - name: Publish appcast.xml
        run: |
          cp "appcast.xml" "gh-pages/appcast.xml"
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No appcast changes to publish."
            exit 0
          fi
          git add appcast.xml
          git commit -m "Update appcast"
          git push
